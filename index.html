<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bitcoin Price Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<!-- Background effects -->
<div class="bg-circle bg1"></div>
<div class="bg-circle bg2"></div>

<div class="container">
    <div class="logo">₿</div>
    <h1>Bitcoin Predictor</h1>
    <p class="subtitle">AI-Powered Price Movement Prediction</p>

    <form method="POST">
        <div class="input-group">
            <input type="number" step="any" name="open_close" placeholder="Open − Close Price" required>
        </div>

        <div class="input-group">
            <input type="number" step="any" name="low_high" placeholder="Low − High Price" required>
        </div>

        <div class="input-group">
            <input type="number" name="quarter_end" placeholder="Quarter End (0 or 1)" required>
        </div>

        <button type="submit">Predict Price Movement</button>
    </form>

    {% if prediction %}
        <div class="result-box 
            {% if 'UP' in prediction %}up
            {% elif 'DOWN' in prediction %}down
            {% else %}error{% endif %}">
            {{ prediction }}
        </div>
    {% endif %}

    <div class="footer">
        © 2026 Bitcoin Prediction System
    </div>
</div>

<div class="section-gap"></div>


<!-- TradingView Widget BEGIN -->
<div class="chart-container">
    <div id="tradingview_btc"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script type="text/javascript">
new TradingView.widget({
    "width": "100%",
    "height": 400,
    "symbol": "BTCUSDT",
    "interval": "15",
    "timezone": "Asia/Kolkata",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "toolbar_bg": "#1e1e1e",
    "enable_publishing": false,
    "allow_symbol_change": false,
    "container_id": "tradingview_btc"
});
</script>

<!-- TradingView Widget END -->

</html>
